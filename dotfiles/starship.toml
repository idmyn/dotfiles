# format set in ../home.nix

format = "$directory${custom.jj}$line_break$cmd_duration$character"

[character]
error_symbol = "->"
success_symbol = "->"

[cmd_duration]
min_time = 60000
min_time_to_notify = 300000
# show_notifications = true

[directory]
style = "none"
truncation_length = 5

[gcloud]
format = "[$symbol$project](bold blue) "
symbol = "☁️ "

[git_branch]
style = "green"
symbol = "🌱 "

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship", "--no-jj-prefix", "--no-jj-status", "--no-jj-name", "--shortest-id", "--jj-desc-length", "35"]
symbol = "󱗆"
format = "[$symbol](blue bold) $output "
